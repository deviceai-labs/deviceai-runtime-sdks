name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Compile checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Compile kotlin/core (Android)
        run: ./gradlew :kotlin:core:compileDebugKotlinAndroid --no-daemon

      - name: Compile kotlin/speech (Android)
        run: ./gradlew :kotlin:speech:compileDebugKotlinAndroid --no-daemon

      - name: Compile kotlin/llm (Android)
        run: ./gradlew :kotlin:llm:compileDebugKotlinAndroid --no-daemon

      - name: Compile sample app (Android)
        run: ./gradlew :samples:androidApp:compileDebugKotlin --no-daemon
