name: DeviceAILabs
options:
  bundleIdPrefix: dev.deviceai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

packages:
  DeviceAI:
    path: ../../swift

targets:
  DeviceAILabs:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
    resources:
      - Resources
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_NAME: DeviceAI Labs
        PRODUCT_BUNDLE_IDENTIFIER: dev.deviceai.labs.ios
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: CHS9FUKAGX
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Required by CLlama.xcframework and CWhisper.xcframework:
        # -lc++          → C++ standard library (llama.cpp / whisper.cpp are C++)
        # -framework Accelerate → Apple BLAS/vDSP (built with GGML_ACCELERATE=ON)
        OTHER_LDFLAGS: $(inherited) -lc++ -framework Accelerate
    dependencies:
      - package: DeviceAI
        product: DeviceAiLlm
      - package: DeviceAI
        product: DeviceAiStt
